<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llanos Core - Soporte Técnico</title>

    <!-- ── PWA CONFIGURATION ── -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- iOS / Apple Touch Icon -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Llanos Core">
    <link rel="apple-touch-icon" href="Gemini_Generated_Image_qamunwqamunwqamu.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap');

        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #10b981;
            --bg-deep: #030712;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            color: white; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* ── DYNAMIC COSMIC BACKGROUND ── */
        .stars-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
            background: radial-gradient(circle at center, #1e1b4b 0%, #030712 100%);
        }

        /* Multiple Star Layers */
        .stars, .stars2, .stars3 {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-repeat: repeat;
        }

        .stars {
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 50px 160px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 80px 120px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            animation: moveStars 100s linear infinite;
        }

        .stars2 {
            background-image: 
                radial-gradient(2px 2px at 100px 150px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 200px 300px, #fff, rgba(0,0,0,0));
            background-size: 300px 300px;
            animation: moveStars 150s linear infinite;
            opacity: 0.5;
        }

        @keyframes moveStars {
            from { transform: translateY(0); }
            to { transform: translateY(-2000px); }
        }

        /* ── INTERFACE CARD ── */
        .card {
            position: relative; z-index: 10;
            width: 90%; max-width: 480px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: all 0.5s ease;
        }

        h1 { font-size: 36px; font-weight: 800; margin: 0; letter-spacing: -1px; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .tagline { font-size: 11px; color: #818cf8; text-transform: uppercase; letter-spacing: 4px; margin-top: 10px; font-weight: 800; }

        /* ── FORM ── */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .field { margin-bottom: 20px; text-align: left; }
        .field.full { grid-column: span 2; }
        
        label { font-size: 11px; font-weight: 800; color: #818cf8; margin-left: 12px; margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select, textarea {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 15px 18px; color: white;
            font-size: 15px; font-family: inherit; outline: none;
            box-sizing: border-box; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary); background: rgba(255,255,255,0.05); box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }

        /* ── BUTTONS ── */
        .btn-main {
            width: 100%; padding: 20px; border-radius: 20px;
            border: none; font-size: 16px; font-weight: 800; cursor: pointer;
            color: white; background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            transition: 0.4s; text-transform: uppercase; letter-spacing: 1px;
            margin-top: 10px;
        }
        .btn-main:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 20px 50px rgba(99, 102, 241, 0.6); }

        .btn-back {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 12px 24px; border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: 0.3s; margin-top: 20px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-back:hover { background: rgba(255, 255, 255, 0.1); color: white; border-color: white; }
        .btn-back svg { margin-right: 8px; width: 16px; height: 16px; }

        .hidden { display: none; opacity: 0; }
        
        /* ── SUCCESS ── */
        .success-circle {
            width: 80px; height: 80px; border-radius: 50%; background: rgba(16, 185, 129, 0.1);
            border: 2px solid var(--accent); margin: 0 auto 25px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: var(--accent); box-shadow: 0 0 40px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="stars"></div>
        <div class="stars2"></div>
        <div class="stars3"></div>
    </div>

    <!-- INICIO -->
    <div class="card" id="v-start">
        <div style="font-size: 55px; margin-bottom: 15px;">🛸</div>
        <h1>Llanos Core</h1>
        <div class="tagline">Próxima Generación</div>
        <p style="color: #94a3b8; line-height: 1.8; margin-bottom: 30px;">
            Bienvenido al portal oficial de recepción técnica. <br>Sincronice su equipo con nuestro laboratorio.
        </p>
        <button class="btn-main" onclick="nav('v-form')">Comenzar Ingreso</button>
    </div>

    <!-- FORMULARIO -->
    <div class="card hidden" id="v-form">
        <h1>Tu Equipo</h1>
        <div class="tagline">Detalles Técnicos</div>
        
        <div class="form-grid">
            <div class="field full">
                <label>Nombre del Propietario</label>
                <input type="text" id="nombre" placeholder="Ej: Juan Pérez">
            </div>
            
            <div class="field">
                <label>ID / Cédula</label>
                <input type="text" id="ci" placeholder="V-00.000.000">
            </div>
            
            <div class="field">
                <label>Teléfono</label>
                <input type="text" id="tel" placeholder="WhatsApp">
            </div>

            <div class="field">
                <label>Marca</label>
                <input type="text" id="marca" placeholder="Ej: Dell, HP, Apple">
            </div>

            <div class="field">
                <label>Modelo</label>
                <input type="text" id="modelo" placeholder="Ej: Latitude 5420">
            </div>

            <div class="field full">
                <label>Descripción de la Falla</label>
                <textarea id="falla" rows="3" placeholder="Explique el problema brevemente..."></textarea>
            </div>
        </div>
        
        <button class="btn-main" id="btn-submit" onclick="enviar()">Sincronizar con el Sistema</button>
        
        <button class="btn-back" onclick="nav('v-start')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Volver al Inicio
        </button>
    </div>

    <!-- ÉXITO -->
    <div class="card hidden" id="v-success">
        <div class="success-circle">✓</div>
        <h1>¡Recibido!</h1>
        <p style="color: #94a3b8; line-height: 1.6;">Su información ya está en nuestro centro de datos. <br>Le esperamos para iniciar el diagnóstico.</p>
        
        <button class="btn-main" style="background: var(--accent); box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);" onclick="wa()">
            Avisar por WhatsApp
        </button>
        
        <button class="btn-back" onclick="location.reload()">Nuevo Registro</button>
    </div>

    <script>
        const API_URL = "https://llanos-core-gestion-docmentos-default-rtdb.firebaseio.com/registros.json";
        let cached = null;

        function nav(id) {
            document.querySelectorAll('.card').forEach(c => {
                c.classList.add('hidden');
                c.style.opacity = "0";
            });
            const t = document.getElementById(id);
            t.classList.remove('hidden');
            setTimeout(() => t.style.opacity = "1", 50);
        }

        async function enviar() {
            const b = document.getElementById('btn-submit');
            const d = {
                nombre: document.getElementById('nombre').value.trim(),
                ci: document.getElementById('ci').value.trim(),
                telefono: document.getElementById('tel').value.trim(),
                marca: document.getElementById('marca').value.trim(),
                modelo: document.getElementById('modelo').value.trim(),
                info: document.getElementById('falla').value.trim(),
                fecha: new Date().toLocaleString(),
                status: 'nuevo'
            };

            if(!d.nombre || !d.ci || !d.telefono || !d.marca || !d.info) {
                alert("⚠️ Por favor complete todos los datos técnicos.");
                return;
            }

            b.disabled = true; b.innerText = "CONECTANDO...";

            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(d) });
                cached = d;
                nav('v-success');
            } catch (e) {
                alert("Error de enlace satelital.");
                b.disabled = false; b.innerText = "Sincronizar con el Sistema";
            }
        }

        function wa() {
            const m = `Hola *Llanos Core*! 👋\n\nHe registrado mi ingreso:\n👤 *Cliente:* ${cached.nombre}\n💻 *Equipo:* ${cached.marca} ${cached.modelo}\n🛠️ *Falla:* ${cached.info}`;
            window.open(`https://api.whatsapp.com/send?phone=584243576308&text=${encodeURIComponent(m)}`);
        }
    </script>
</body>
</html>
